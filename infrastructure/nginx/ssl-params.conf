# ============================================================================
# Alchymine — SSL/TLS Parameters
# Reference: Mozilla SSL Configuration Generator (Intermediate profile)
# ============================================================================

# ── Protocol versions ────────────────────────────────────────────────────────
# TLS 1.2+ only — TLS 1.0 and 1.1 are deprecated (RFC 8996)
ssl_protocols TLSv1.2 TLSv1.3;

# ── Cipher suites ────────────────────────────────────────────────────────────
# Strong ciphers with forward secrecy; server preference ordering
ssl_prefer_server_ciphers on;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# ── Diffie-Hellman parameter ─────────────────────────────────────────────────
# Generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
# Uncomment after generating:
# ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ── Session settings ────────────────────────────────────────────────────────
ssl_session_timeout 1d;
ssl_session_cache   shared:SSL:10m;
ssl_session_tickets off;

# ── OCSP stapling ───────────────────────────────────────────────────────────
# Provides OCSP responses to clients, reducing certificate verification time
ssl_stapling        on;
ssl_stapling_verify on;

# Trusted CA certificate for OCSP verification (Let's Encrypt chain)
# This is the default Let's Encrypt intermediate; adjust if using a different CA
ssl_trusted_certificate /etc/letsencrypt/live/alchymine.com/chain.pem;

# DNS resolver for OCSP stapling
# NOTE: The resolver directive lives in nginx.conf (Docker DNS 127.0.0.11)
# to avoid duplication. OCSP stapling inherits it from the http{} block.

# ── Buffer sizes ─────────────────────────────────────────────────────────────
ssl_buffer_size 4k;

# ── Early data (TLS 1.3 0-RTT) ──────────────────────────────────────────────
# Disabled by default — enable only if you understand the replay attack risks
# ssl_early_data on;
