# ============================================================================
# Alchymine — Nginx Reverse Proxy Configuration
# Domain: alchymine.com
# Services: Next.js (port 3000) + FastAPI (port 8000)
# ============================================================================

# ── Global settings ──────────────────────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 8192;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ───────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;      # Hide nginx version

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        application/xhtml+xml
        image/svg+xml
        font/woff2;

    # ── Rate limiting ────────────────────────────────────────────────────────
    # General rate limit: 10 requests/sec per IP with burst
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # API rate limit: 30 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Login/auth rate limit: 5 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream definitions ─────────────────────────────────────────────────
    upstream nextjs {
        server web:3000;
        keepalive 32;
    }

    upstream fastapi {
        server api:8000;
        keepalive 32;
    }

    # ── SSL parameters (shared) ──────────────────────────────────────────────
    include /etc/nginx/conf.d/ssl-params.conf;

    # ════════════════════════════════════════════════════════════════════════
    # HTTP server — redirect all traffic to HTTPS
    # ════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name alchymine.com www.alchymine.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ════════════════════════════════════════════════════════════════════════
    # HTTPS server — main application
    # ════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name alchymine.com www.alchymine.com;

        # ── SSL certificates (Let's Encrypt via Certbot) ────────────────────
        ssl_certificate     /etc/letsencrypt/live/alchymine.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/alchymine.com/privkey.pem;

        # ── Security headers ────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        # X-Frame-Options is kept for older browsers; frame-ancestors 'none' in CSP is the modern equivalent.
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        # Content-Security-Policy notes:
        #   script-src: 'unsafe-inline' is required because Next.js 14 App Router injects
        #     inline scripts for hydration (__NEXT_DATA__, React server component payloads).
        #     'unsafe-eval' has been removed — it is not needed for production Next.js builds.
        #     To fully eliminate 'unsafe-inline', add a nonce-based CSP middleware to the
        #     Next.js app (see docs/adr for future work).
        #   style-src: 'unsafe-inline' is kept for Tailwind CSS, which generates inline styles.
        #   frame-ancestors: 'none' — this application is never embedded in a frame.
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.anthropic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # ── Request size limits ─────────────────────────────────────────────
        client_max_body_size 10m;

        # ── API reverse proxy (/api/) ───────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://fastapi/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Do not pass security headers from upstream (we set them above)
            proxy_hide_header X-Powered-By;
        }

        # ── Auth endpoints — stricter rate limit ────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://fastapi/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }

        # ── Static file caching (Next.js _next/static) ─────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Immutable cache — these files are content-hashed
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── PWA assets + public files ───────────────────────────────────────
        location ~* \.(ico|png|svg|webp|jpg|jpeg|gif|woff|woff2|ttf|eot|json|webmanifest)$ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        # ── Next.js frontend (catch-all) ────────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Health check endpoint ───────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── Deny access to hidden files ─────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
