# Alchymine - Production Docker Compose Configuration
# Usage: docker compose -f infrastructure/docker-compose.yml up -d
# Dev:   docker compose -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.dev.yml up

services:
  # ─── API (FastAPI + Uvicorn) ─────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: alchymine-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-alchymine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-alchymine}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}

      - ALCHYMINE_ENCRYPTION_KEY=${ALCHYMINE_ENCRYPTION_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["http://localhost:3000"]}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@alchymine.app}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PDF_SERVICE_TOKEN=${PDF_SERVICE_TOKEN:?PDF_SERVICE_TOKEN must be set}
      - PDF_SERVICE_URL=http://pdf-service:3001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - alchymine-net
      - pdf-net

  # ─── Web (Next.js Frontend) ──────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: alchymine-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - alchymine-net

  # ─── Database (PostgreSQL 15) ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: alchymine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alchymine}
      POSTGRES_USER: ${POSTGRES_USER:-alchymine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-alchymine} -d ${POSTGRES_DB:-alchymine}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - alchymine-net

  # ─── Redis (Redis 7) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alchymine-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - alchymine-net

  # ─── Worker (Celery — same image as API) ─────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: alchymine-worker
    restart: unless-stopped
    stop_grace_period: 120s
    command: >
      celery -A alchymine.workers.celery_app worker
      --loglevel=${LOG_LEVEL:-warning}
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --max-tasks-per-child=1000
      --queues=celery,reports
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-alchymine}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-alchymine}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - REDIS_CACHE_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/1
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set}

      - ALCHYMINE_ENCRYPTION_KEY=${ALCHYMINE_ENCRYPTION_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PDF_SERVICE_TOKEN=${PDF_SERVICE_TOKEN:?PDF_SERVICE_TOKEN must be set}
      - PDF_SERVICE_URL=http://pdf-service:3001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "celery",
          "-A",
          "alchymine.workers.celery_app",
          "inspect",
          "ping",
          "--timeout",
          "10",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - alchymine-net
      - pdf-net

  # ─── PDF Service (Puppeteer) ──────────────────────────────────────────────
  pdf-service:
    build:
      context: ..
      dockerfile: infrastructure/docker/Dockerfile.pdf
    container_name: alchymine-pdf
    restart: unless-stopped
    environment:
      - PDF_SERVICE_TOKEN=${PDF_SERVICE_TOKEN:?PDF_SERVICE_TOKEN must be set}
      - PDF_PORT=3001
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # pdf-service is intentionally NOT on alchymine-net — it is only reachable
    # from api and worker via the isolated pdf-net bridge.
    networks:
      - pdf-net

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  alchymine-net:
    driver: bridge
    name: alchymine-net
  # Isolated network for PDF service — only api and worker can reach it.
  # The PDF service is not on alchymine-net so web/nginx cannot call it directly.
  pdf-net:
    driver: bridge
    name: alchymine-pdf-net
    internal: true

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
    name: alchymine-db-data
  redis_data:
    driver: local
    name: alchymine-redis-data
