# Alchymine Alembic Configuration
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migration scripts directory
script_location = alchymine/db/migrations

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# sys.path prepend — project root so imports work
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename. Defaults to UTC.
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions directory.
# sourceless = false

# Version path separator — use OS-specific separator.
# version_path_separator = os

# sqlalchemy.url is set programmatically in env.py from DATABASE_URL
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Run ruff formatting after auto-generating migrations
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
