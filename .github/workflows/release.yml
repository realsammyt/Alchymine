# Alchymine — Release Pipeline
# Triggers on version tags (v*): runs semantic release, generates changelog,
# builds and pushes production Docker images with proper version tags.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/alchymine

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Validate the release tag and extract metadata
  # ──────────────────────────────────────────────
  validate:
    name: "Validate: release tag"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}
      patch: ${{ steps.parse.outputs.patch }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      build_date: ${{ steps.parse.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: parse
        run: |
          # Use the tag from the event or from manual input
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "Processing tag: $TAG"

          # Validate semver format
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-([a-zA-Z]+\.[0-9]+))?$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected v<major>.<minor>.<patch>[-<prerelease>])"
            exit 1
          fi

          VERSION="${TAG#v}"
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          PRERELEASE="${BASH_REMATCH[5]}"
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          IS_PRERELEASE="false"
          if [[ -n "$PRERELEASE" || "${{ inputs.prerelease }}" == "true" ]]; then
            IS_PRERELEASE="true"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}" >> "$GITHUB_OUTPUT"
          echo "patch=${PATCH}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          echo "Parsed release:"
          echo "  Version:    ${VERSION}"
          echo "  Major:      ${MAJOR}"
          echo "  Minor:      ${MINOR}"
          echo "  Patch:      ${PATCH}"
          echo "  Prerelease: ${PRERELEASE:-none}"
          echo "  Date:       ${BUILD_DATE}"

      - name: Verify tag matches pyproject.toml version
        run: |
          PYPROJECT_VERSION=$(grep -Po '(?<=version = ")[^"]+' pyproject.toml | head -1)
          TAG_VERSION="${{ steps.parse.outputs.version }}"

          # Strip prerelease suffix for comparison
          TAG_BASE=$(echo "$TAG_VERSION" | sed 's/-.*//')

          if [[ "$TAG_BASE" != "$PYPROJECT_VERSION" ]]; then
            echo "::warning::Tag version ($TAG_BASE) does not match pyproject.toml ($PYPROJECT_VERSION)"
            echo "This may be intentional for release candidates."
          fi

  # ──────────────────────────────────────────────
  # Run the full test suite before releasing
  # ──────────────────────────────────────────────
  test-gate:
    name: "Gate: run test suite"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full Python test suite
        run: |
          pytest tests/engine/ tests/api/ tests/agents/ \
            -v \
            --cov=alchymine \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: alchymine/web/package-lock.json

      - name: Run web tests
        working-directory: alchymine/web
        run: |
          npm ci
          npx jest --ci --coverage

  # ──────────────────────────────────────────────
  # Generate changelog from conventional commits
  # ──────────────────────────────────────────────
  changelog:
    name: "Changelog: generate release notes"
    runs-on: ubuntu-latest
    needs: [validate]
    outputs:
      changelog: ${{ steps.generate.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev-tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV_TAG:-none (first release)}"

      - name: Generate changelog from commits
        id: generate
        run: |
          PREV_TAG="${{ steps.prev-tag.outputs.previous_tag }}"
          VERSION="${{ needs.validate.outputs.version }}"

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Generate structured changelog from conventional commits
          {
            echo "## What's Changed in v${VERSION}"
            echo ""

            # Features
            FEATURES=$(git log "${RANGE}" --pretty=format:"%s" --grep="^feat" | sed 's/^feat[(:]*/- /' | sed 's/): /: /')
            if [[ -n "$FEATURES" ]]; then
              echo "### New Features"
              echo "$FEATURES"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "${RANGE}" --pretty=format:"%s" --grep="^fix" | sed 's/^fix[(:]*/- /' | sed 's/): /: /')
            if [[ -n "$FIXES" ]]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Breaking changes
            BREAKING=$(git log "${RANGE}" --pretty=format:"%s" --grep="BREAKING CHANGE" | sed 's/^/- /')
            if [[ -n "$BREAKING" ]]; then
              echo "### Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi

            # Other changes
            OTHER=$(git log "${RANGE}" --pretty=format:"%s" \
              --grep="^feat" --grep="^fix" --grep="BREAKING CHANGE" --invert-grep \
              | head -20 \
              | sed 's/^/- /')
            if [[ -n "$OTHER" ]]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            # Contributors
            echo "### Contributors"
            git log "${RANGE}" --pretty=format:"- @%an" | sort -u
            echo ""

            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...v${VERSION}"
          } > changelog.md

          echo "Generated changelog:"
          cat changelog.md

          # Store changelog as output (escape newlines for GitHub Actions)
          {
            echo "changelog<<CHANGELOG_EOF"
            cat changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md
          retention-days: 90

  # ──────────────────────────────────────────────
  # Build and push production Docker images
  # ──────────────────────────────────────────────
  build-release:
    name: "Build & Push: ${{ matrix.image }} (production)"
    runs-on: ubuntu-latest
    needs: [validate, test-gate]
    strategy:
      fail-fast: true
      matrix:
        image: [engine, api, web]
        include:
          - image: engine
            context: .
            dockerfile: infrastructure/docker/Dockerfile.engine
          - image: api
            context: .
            dockerfile: infrastructure/docker/Dockerfile.api
          - image: web
            context: alchymine/web
            dockerfile: infrastructure/docker/Dockerfile.web
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            # Full version: v1.2.3
            type=semver,pattern={{version}}
            # Major.Minor: v1.2
            type=semver,pattern={{major}}.{{minor}}
            # Major only: v1
            type=semver,pattern={{major}}
            # Latest (only for non-prerelease)
            type=raw,value=latest,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
            # SHA
            type=sha,prefix=,format=short

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: |
            ${{ steps.docker-meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.created=${{ needs.validate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Alchymine ${{ matrix.image }}
            org.opencontainers.image.description=Alchymine ${{ matrix.image }} service
            org.opencontainers.image.vendor=Alchymine
            org.opencontainers.image.licenses=CC-BY-NC-SA-4.0
          build-args: |
            BUILD_DATE=${{ needs.validate.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.validate.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Verify pushed image
        run: |
          docker buildx imagetools inspect \
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ needs.validate.outputs.version }}

  # ──────────────────────────────────────────────
  # Create GitHub Release with changelog
  # ──────────────────────────────────────────────
  github-release:
    name: "Release: create GitHub release"
    runs-on: ubuntu-latest
    needs: [validate, changelog, build-release]
    steps:
      - uses: actions/checkout@v4

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Append Docker image info to release notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          {
            cat changelog.md
            echo ""
            echo "## Docker Images"
            echo ""
            echo "Pull the release images:"
            echo ""
            echo '```bash'
            echo "docker pull ${{ env.IMAGE_PREFIX }}-engine:${VERSION}"
            echo "docker pull ${{ env.IMAGE_PREFIX }}-api:${VERSION}"
            echo "docker pull ${{ env.IMAGE_PREFIX }}-web:${VERSION}"
            echo '```'
            echo ""
            echo "Or use the \`latest\` tag:"
            echo ""
            echo '```bash'
            echo "docker pull ${{ env.IMAGE_PREFIX }}-engine:latest"
            echo "docker pull ${{ env.IMAGE_PREFIX }}-api:latest"
            echo "docker pull ${{ env.IMAGE_PREFIX }}-web:latest"
            echo '```'
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: "Alchymine v${{ needs.validate.outputs.version }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          make_latest: ${{ needs.validate.outputs.is_prerelease == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Post-release verification
  # ──────────────────────────────────────────────
  verify-release:
    name: "Verify: release artifacts"
    runs-on: ubuntu-latest
    needs: [validate, build-release, github-release]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all images are pullable
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          FAILED=0

          for IMAGE in engine api web; do
            FULL="${{ env.IMAGE_PREFIX }}-${IMAGE}:${VERSION}"
            echo "Pulling ${FULL}..."
            if docker pull "${FULL}"; then
              echo "  OK: ${FULL}"
            else
              echo "  FAIL: ${FULL}"
              FAILED=$((FAILED + 1))
            fi
          done

          if [[ "$FAILED" -gt 0 ]]; then
            echo "::error::$FAILED image(s) could not be pulled"
            exit 1
          fi

          echo "All release images verified."

      - name: Verify GitHub Release exists
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          RELEASE=$(gh release view "v${VERSION}" --repo "${{ github.repository }}" --json tagName,isDraft,isPrerelease 2>/dev/null || echo "NOT_FOUND")

          if [[ "$RELEASE" == "NOT_FOUND" ]]; then
            echo "::error::GitHub Release v${VERSION} not found"
            exit 1
          fi

          echo "GitHub Release v${VERSION} verified:"
          echo "$RELEASE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Release summary
  # ──────────────────────────────────────────────
  release-summary:
    name: "Summary"
    runs-on: ubuntu-latest
    if: always()
    needs: [validate, test-gate, changelog, build-release, github-release, verify-release]
    steps:
      - name: Generate release summary
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          echo "## Release Summary: v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Gate | ${{ needs.test-gate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Changelog | ${{ needs.changelog.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build & Push | ${{ needs.build-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Release | ${{ needs.github-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verification | ${{ needs.verify-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Overall status
          if [[ "${{ needs.verify-release.result }}" == "success" ]]; then
            echo "**Status: Release v${VERSION} published successfully.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Status: Release v${VERSION} encountered issues. Check individual stages.**" >> "$GITHUB_STEP_SUMMARY"
          fi
