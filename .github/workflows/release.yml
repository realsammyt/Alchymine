# Alchymine — Release Pipeline
# Triggers when a draft release is published: builds Docker images,
# pushes to GHCR, and deploys to the DigitalOcean droplet via SSH.

name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/alchymine

jobs:
  # ──────────────────────────────────────────────
  # Validate the release tag and extract metadata
  # ──────────────────────────────────────────────
  validate:
    name: "Validate: release tag"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      build_date: ${{ steps.parse.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Processing tag: $TAG"

          # Validate semver format
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-([a-zA-Z]+\.[0-9]+))?$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected v<major>.<minor>.<patch>[-<prerelease>])"
            exit 1
          fi

          VERSION="${TAG#v}"
          PRERELEASE="${BASH_REMATCH[5]}"
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          IS_PRERELEASE="false"
          if [[ -n "$PRERELEASE" ]]; then
            IS_PRERELEASE="true"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          echo "Parsed: version=${VERSION}, prerelease=${IS_PRERELEASE}"

  # ──────────────────────────────────────────────
  # Build and push production Docker images
  # ──────────────────────────────────────────────
  build-release:
    name: "Build & Push: ${{ matrix.image }}"
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: api
            context: .
            dockerfile: infrastructure/docker/Dockerfile.api
            build_args: ""
          - image: web
            context: .
            dockerfile: infrastructure/docker/Dockerfile.web
            build_args: APP_VERSION=${{ needs.validate.outputs.version }}
          - image: worker
            context: .
            dockerfile: infrastructure/docker/Dockerfile.worker
            build_args: ""
          - image: pdf
            context: .
            dockerfile: infrastructure/docker/Dockerfile.pdf
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.7.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: docker-meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.5.1
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
            type=sha,prefix=,format=short

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.9.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: |
            ${{ steps.docker-meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.created=${{ needs.validate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            ${{ matrix.build_args }}
            CACHE_BUST=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ──────────────────────────────────────────────
  # Smoke test: verify built images actually start
  # ──────────────────────────────────────────────
  smoke-test:
    name: "Smoke test: images"
    runs-on: ubuntu-latest
    needs: [validate, build-release]
    permissions:
      packages: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify API image starts
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}-api:${{ needs.validate.outputs.version }}"
          docker pull "$IMAGE"
          # Dummy env vars satisfy pydantic-settings validators at import time
          docker run --rm \
            -e JWT_SECRET_KEY="smoke-test-dummy-key-that-is-at-least-32-chars-long" \
            -e SIGNUP_PROMO_CODE="smoke-test-code" \
            "$IMAGE" python -c "from alchymine.api.main import app; print('API smoke test passed')"

      - name: Pull and verify Worker image starts
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}-worker:${{ needs.validate.outputs.version }}"
          docker pull "$IMAGE"
          docker run --rm \
            -e JWT_SECRET_KEY="smoke-test-dummy-key-that-is-at-least-32-chars-long" \
            -e SIGNUP_PROMO_CODE="smoke-test-code" \
            "$IMAGE" python -c "from alchymine.workers.celery_app import app; print('Worker smoke test passed')"

  # ──────────────────────────────────────────────
  # Update GitHub Release with Docker image info
  # ──────────────────────────────────────────────
  update-release:
    name: "Update release notes"
    runs-on: ubuntu-latest
    needs: [validate, build-release]
    permissions:
      contents: write
    steps:
      - name: Append Docker image info to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ needs.validate.outputs.version }}
          PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json body -q .body > /tmp/body.md
          {
            echo ""
            echo "## Docker Images"
            echo ""
            echo '```bash'
            echo "docker pull ${PREFIX}-api:${VERSION}"
            echo "docker pull ${PREFIX}-web:${VERSION}"
            echo "docker pull ${PREFIX}-worker:${VERSION}"
            echo "docker pull ${PREFIX}-pdf:${VERSION}"
            echo '```'
          } >> /tmp/body.md
          gh release edit "$TAG" -R "$GITHUB_REPOSITORY" --notes-file /tmp/body.md

  # ──────────────────────────────────────────────
  # Deploy to DigitalOcean via SSH
  # ──────────────────────────────────────────────
  deploy:
    name: "Deploy to production"
    runs-on: ubuntu-latest
    needs: [validate, build-release, smoke-test]
    environment: production
    permissions:
      contents: read
    steps:
      - name: Deploy via SSH (zero-downtime)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            echo "Deploying Alchymine ${TAG} (zero-downtime)..."

            cd /home/alchymine/Alchymine

            # Download release tarball for updated compose files, scripts, nginx config
            # --fail: return exit code 22 on HTTP errors (instead of saving error HTML)
            # --retry: retry transient failures
            echo "Downloading ${TAG} tarball..."
            TARBALL="/tmp/alchymine-${TAG}.tar.gz"
            curl --fail --silent --show-error --location --retry 3 --retry-delay 5 \
              "https://github.com/realsammyt/Alchymine/archive/refs/tags/${TAG}.tar.gz" \
              -o "${TARBALL}"

            # Validate the tarball is actually a gzip file before extracting
            if ! file "${TARBALL}" | grep -q 'gzip'; then
              echo "ERROR: Downloaded file is not a valid gzip tarball."
              echo "Content: $(head -c 200 "${TARBALL}")"
              rm -f "${TARBALL}"
              exit 1
            fi

            tar xzf "${TARBALL}" --strip-components=1 -C /home/alchymine/Alchymine
            rm -f "${TARBALL}"

            # Verify production env file exists
            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found. Run deploy-digitalocean.sh first."
              exit 1
            fi

            # Run zero-downtime deploy (pulls GHCR images, health-checks, swaps nginx)
            chmod +x infrastructure/scripts/deploy-zero-downtime.sh
            infrastructure/scripts/deploy-zero-downtime.sh "${VERSION}"
