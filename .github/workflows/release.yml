# Alchymine — Release Pipeline
# Triggers on version tags (v*): builds and pushes production Docker images,
# creates a GitHub Release with changelog.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/alchymine

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Validate the release tag and extract metadata
  # ──────────────────────────────────────────────
  validate:
    name: "Validate: release tag"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      build_date: ${{ steps.parse.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse release tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Processing tag: $TAG"

          # Validate semver format
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-([a-zA-Z]+\.[0-9]+))?$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected v<major>.<minor>.<patch>[-<prerelease>])"
            exit 1
          fi

          VERSION="${TAG#v}"
          PRERELEASE="${BASH_REMATCH[5]}"
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          IS_PRERELEASE="false"
          if [[ -n "$PRERELEASE" ]]; then
            IS_PRERELEASE="true"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          echo "Parsed: version=${VERSION}, prerelease=${IS_PRERELEASE}"

  # ──────────────────────────────────────────────
  # Run the full test suite before releasing
  # ──────────────────────────────────────────────
  test-gate:
    name: "Gate: run test suite"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full Python test suite
        run: |
          pytest tests/engine/ tests/api/ tests/agents/ \
            -v \
            --cov=alchymine \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ──────────────────────────────────────────────
  # Generate changelog from git history
  # ──────────────────────────────────────────────
  changelog:
    name: "Changelog: generate release notes"
    runs-on: ubuntu-latest
    needs: [validate]
    outputs:
      changelog: ${{ steps.generate.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev-tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV_TAG:-none (first release)}"

      - name: Generate changelog from commits
        id: generate
        run: |
          PREV_TAG="${{ steps.prev-tag.outputs.previous_tag }}"
          VERSION="${{ needs.validate.outputs.version }}"

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "## What's Changed in v${VERSION}"
            echo ""

            FEATURES=$(git log "${RANGE}" --pretty=format:"%s" --grep="^feat" | sed 's/^feat[(:]*/- /' | sed 's/): /: /')
            if [[ -n "$FEATURES" ]]; then
              echo "### New Features"
              echo "$FEATURES"
              echo ""
            fi

            FIXES=$(git log "${RANGE}" --pretty=format:"%s" --grep="^fix" | sed 's/^fix[(:]*/- /' | sed 's/): /: /')
            if [[ -n "$FIXES" ]]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            OTHER=$(git log "${RANGE}" --pretty=format:"%s" \
              --grep="^feat" --grep="^fix" --invert-grep \
              | head -20 \
              | sed 's/^/- /')
            if [[ -n "$OTHER" ]]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-initial}...v${VERSION}"
          } > changelog.md

          {
            echo "changelog<<CHANGELOG_EOF"
            cat changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: changelog.md
          retention-days: 90

  # ──────────────────────────────────────────────
  # Build and push production Docker images
  # ──────────────────────────────────────────────
  build-release:
    name: "Build & Push: ${{ matrix.image }}"
    runs-on: ubuntu-latest
    needs: [validate, test-gate]
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: api
            context: .
            dockerfile: infrastructure/Dockerfile.api
          - image: web
            context: .
            dockerfile: infrastructure/Dockerfile.web
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.validate.outputs.is_prerelease == 'false' }}
            type=sha,prefix=,format=short

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: |
            ${{ steps.docker-meta.outputs.labels }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
            org.opencontainers.image.created=${{ needs.validate.outputs.build_date }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ──────────────────────────────────────────────
  # Create GitHub Release with changelog
  # ──────────────────────────────────────────────
  github-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [validate, changelog, build-release]
    steps:
      - uses: actions/checkout@v4

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog

      - name: Append Docker image info to release notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          {
            cat changelog.md
            echo ""
            echo "## Docker Images"
            echo ""
            echo '```bash'
            echo "docker pull ${{ env.IMAGE_PREFIX }}-api:${VERSION}"
            echo "docker pull ${{ env.IMAGE_PREFIX }}-web:${VERSION}"
            echo '```'
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: "Alchymine v${{ needs.validate.outputs.version }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          make_latest: ${{ needs.validate.outputs.is_prerelease == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
