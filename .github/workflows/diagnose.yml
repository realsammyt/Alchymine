# Manually triggered to diagnose or hotfix the droplet
name: Diagnose

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "diagnose"
        type: choice
        options:
          - diagnose
          - hotfix-pull-restart
          - rollback

jobs:
  run:
    name: "${{ inputs.action }}"
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH into droplet
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -ex
            cd /home/alchymine/Alchymine
            DC="docker compose --env-file .env.production -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.prod.yml"

            if [ "${{ inputs.action }}" = "rollback" ]; then
              echo "=== Rollback to previous version ==="
              CURRENT=$(cat .deployed-version 2>/dev/null || echo "unknown")
              PREVIOUS=$(cat .previous-version 2>/dev/null || echo "")

              if [ -z "$PREVIOUS" ]; then
                echo "ERROR: No .previous-version file found — nothing to roll back to."
                echo "Current version: ${CURRENT}"
                echo "This happens if only one deploy has been run with the zero-downtime script."
                echo "To deploy a specific version manually, SSH in and run:"
                echo "  infrastructure/scripts/deploy-zero-downtime.sh <version>"
                exit 1
              fi

              echo "Current version: ${CURRENT}"
              echo "Rolling back to: ${PREVIOUS}"

              chmod +x infrastructure/scripts/deploy-zero-downtime.sh
              infrastructure/scripts/deploy-zero-downtime.sh "${PREVIOUS}"
              echo "Rollback complete. Now serving v${PREVIOUS}"

            elif [ "${{ inputs.action }}" = "hotfix-pull-restart" ]; then
              echo "=== Hotfix: pulling latest main and restarting ==="
              # Download latest main tarball (avoids .git permission issues)
              curl -sL "https://github.com/realsammyt/Alchymine/archive/refs/heads/main.tar.gz" \
                -o /tmp/alchymine-main.tar.gz
              tar xzf /tmp/alchymine-main.tar.gz --strip-components=1 -C /home/alchymine/Alchymine
              rm -f /tmp/alchymine-main.tar.gz
              $DC up -d --force-recreate nginx
              sleep 3
              $DC ps nginx
              curl -sk https://localhost/ -o /dev/null -w "HTTPS: %{http_code}\n" || echo "443 still down"
              curl -s http://localhost/nginx-health -o /dev/null -w "HTTP: %{http_code}\n" || echo "80 still down"
            else
              echo "=== Container status ==="
              $DC ps -a
              echo "=== Nginx logs (last 30) ==="
              $DC logs --tail=30 nginx
              echo "=== Test ports ==="
              curl -sk https://localhost/ -o /dev/null -w "HTTPS: %{http_code}\n" 2>&1 || echo "443 down"
              curl -s http://localhost/nginx-health -o /dev/null -w "HTTP: %{http_code}\n" 2>&1 || echo "80 down"
              curl -s http://localhost:8000/health -o /dev/null -w "API: %{http_code}\n" 2>&1 || echo "API down"
              curl -s http://localhost:3000/ -o /dev/null -w "Web: %{http_code}\n" 2>&1 || echo "Web down"
              echo "=== Disk ==="
              df -h /
              docker system df
            fi
