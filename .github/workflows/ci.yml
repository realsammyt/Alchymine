# Alchymine — Continuous Integration Pipeline
# Runs on every PR and push to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Lint: ruff check + ruff format --check
  # ──────────────────────────────────────────────
  lint:
    name: "Lint (Python 3.12)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Ruff lint check
        run: ruff check alchymine/

      - name: Ruff format check
        run: ruff format --check alchymine/

  # ──────────────────────────────────────────────
  # Type check: mypy
  # ──────────────────────────────────────────────
  type-check:
    name: "Type check: mypy (Python 3.12)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install mypy type stubs
        run: mypy alchymine/ --install-types --non-interactive || true

      - name: Run mypy
        id: mypy
        run: |
          set +e
          mypy alchymine/ --show-error-codes 2>&1 | tee mypy-output.txt
          MYPY_RC=${PIPESTATUS[0]}
          set -e
          echo "rc=$MYPY_RC" >> $GITHUB_OUTPUT
          exit $MYPY_RC

      - name: Post mypy results to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**mypy (Python 3.12)** exited ${{ steps.mypy.outputs.rc }}"
            echo ""
            echo '```'
            tail -50 mypy-output.txt 2>/dev/null || echo "No output captured"
            echo '```'
          } > /tmp/pr-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-comment.md || true

  # ──────────────────────────────────────────────
  # Test Python: pytest with coverage (matrix)
  # ──────────────────────────────────────────────
  test-python:
    name: "Test Python (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify environment
        run: |
          pip list | grep -iE "celery|redis|aiosqlite|swisseph|asyncpg|sqlalchemy|fastapi|pytest"
          python -c "import alchymine; print('alchymine OK')"
          python -c "import aiosqlite; print('aiosqlite OK')"

      - name: Run ethics check
        run: python -m alchymine.agents.quality.ethics_check

      - name: Collect and run tests
        id: pytest
        env:
          CELERY_ALWAYS_EAGER: "true"
        run: |
          set +e
          python -m pytest tests/ -v --tb=long --junitxml=junit-results.xml 2>&1 | tee pytest-output.txt
          PYTEST_RC=${PIPESTATUS[0]}
          set -e
          echo "rc=$PYTEST_RC" >> $GITHUB_OUTPUT
          exit $PYTEST_RC

      - name: Post test results to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "**pytest (Python ${{ matrix.python-version }})** exited ${{ steps.pytest.outputs.rc }}"
            echo ""
            echo '```'
            tail -100 pytest-output.txt 2>/dev/null || echo "No output captured"
            echo '```'
          } > /tmp/pr-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-comment.md || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: |
            junit-results.xml
            pytest-output.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # Test Frontend: npm test + npm run build
  # ──────────────────────────────────────────────
  test-frontend:
    name: "Test Frontend (Next.js)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alchymine/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: alchymine/web/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: alchymine/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('alchymine/web/package-lock.json') }}-${{ hashFiles('alchymine/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('alchymine/web/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --coverage --passWithNoTests

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ──────────────────────────────────────────────
  # Final gate: all checks must pass
  # ──────────────────────────────────────────────
  ci-passed:
    name: "CI: all checks passed"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - type-check
      - test-python
      - test-frontend
    steps:
      - name: Verify all jobs succeeded
        run: |
          echo "Job results:"
          echo "  lint:           ${{ needs.lint.result }}"
          echo "  type-check:     ${{ needs.type-check.result }}"
          echo "  test-python:    ${{ needs.test-python.result }}"
          echo "  test-frontend:  ${{ needs.test-frontend.result }}"

          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.type-check.result }}" != "success" || \
                "${{ needs.test-python.result }}" != "success" || \
                "${{ needs.test-frontend.result }}" != "success" ]]; then
            echo ""
            echo "FAILED: One or more CI jobs did not succeed."
            exit 1
          fi

          echo ""
          echo "All CI checks passed."
