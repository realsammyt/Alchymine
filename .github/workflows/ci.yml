# Alchymine — Continuous Integration Pipeline
# Runs on every PR and push to main.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

permissions:
  contents: read
  pull-requests: read

jobs:
  # ──────────────────────────────────────────────
  # Lint: ruff check + ruff format --check
  # ──────────────────────────────────────────────
  lint:
    name: "Lint (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.8.0"

      - name: Ruff lint check
        run: ruff check alchymine/

      - name: Ruff format check
        run: ruff format --check alchymine/

  # ──────────────────────────────────────────────
  # Type check: mypy
  # ──────────────────────────────────────────────
  type-check:
    name: "Type check: mypy (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        continue-on-error: true
        run: |
          mypy --version
          pip list | grep -i types
          mypy alchymine/ --install-types --non-interactive --show-error-codes 2>&1

  # ──────────────────────────────────────────────
  # Test Python: pytest with coverage (matrix)
  # ──────────────────────────────────────────────
  test-python:
    name: "Test Python (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify test collection
        env:
          CELERY_ALWAYS_EAGER: "true"
        run: |
          set -x
          pip list | grep -iE "celery|redis|aiosqlite|swisseph|asyncpg|sqlalchemy|fastapi|pytest"
          python -c "import alchymine; print('alchymine OK')" || echo "FAIL: alchymine"
          python -c "import alchymine.workers.celery_app; print('celery OK')" || echo "FAIL: celery"
          python -c "import alchymine.api.main; print('api OK')" || echo "FAIL: api.main"
          python -c "import aiosqlite; print('aiosqlite OK')" || echo "FAIL: aiosqlite"
          python -c "import swisseph; print('swisseph OK')" || echo "FAIL: swisseph"
          pytest --collect-only tests/engine/ tests/api/ tests/agents/ tests/workers/ -q 2>&1 || true

      - name: Run pytest
        env:
          CELERY_ALWAYS_EAGER: "true"
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=junit-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: junit-results.xml
          retention-days: 7

  # ──────────────────────────────────────────────
  # Test Frontend: npm test + npm run build
  # ──────────────────────────────────────────────
  test-frontend:
    name: "Test Frontend (Next.js)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alchymine/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: alchymine/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --coverage --passWithNoTests

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ──────────────────────────────────────────────
  # Ethics check: validate prompts and run ethics gate
  # ──────────────────────────────────────────────
  ethics-check:
    name: "Ethics: validate prompts & quality gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ethics check
        run: python -m alchymine.agents.quality.ethics_check

      - name: Run quality gate tests
        run: pytest tests/agents/ -v

  # ──────────────────────────────────────────────
  # Security: pip-audit + npm audit
  # ──────────────────────────────────────────────
  security:
    name: "Security: dependency audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Upgrade build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Run pip-audit (Python deps)
        continue-on-error: true
        run: |
          pip-audit --desc \
            --skip-editable || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: alchymine/web/package-lock.json

      - name: Install Node dependencies
        working-directory: alchymine/web
        run: npm ci

      - name: Run npm audit (JS deps)
        continue-on-error: true
        working-directory: alchymine/web
        run: npm audit --audit-level=high || true

  # ──────────────────────────────────────────────
  # Final gate: all checks must pass
  # ──────────────────────────────────────────────
  ci-passed:
    name: "CI: all checks passed"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - type-check
      - test-python
      - test-frontend
      - ethics-check
      - security
    steps:
      - name: Verify all jobs succeeded
        run: |
          echo "Job results:"
          echo "  lint:           ${{ needs.lint.result }}"
          echo "  type-check:     ${{ needs.type-check.result }}"
          echo "  test-python:    ${{ needs.test-python.result }}"
          echo "  test-frontend:  ${{ needs.test-frontend.result }}"
          echo "  ethics-check:   ${{ needs.ethics-check.result }}"
          echo "  security:       ${{ needs.security.result }}"

          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.type-check.result }}" != "success" || \
                "${{ needs.test-python.result }}" != "success" || \
                "${{ needs.test-frontend.result }}" != "success" || \
                "${{ needs.ethics-check.result }}" != "success" || \
                "${{ needs.security.result }}" != "success" ]]; then
            echo ""
            echo "FAILED: One or more CI jobs did not succeed."
            exit 1
          fi

          echo ""
          echo "All CI checks passed."
