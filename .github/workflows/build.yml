# Alchymine — Build & Push Docker Images
# Triggers on merge to develop: builds all Docker images and pushes to ghcr.io.

name: Build

on:
  push:
    branches: [develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild all images (ignore cache)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/alchymine

permissions:
  contents: read
  packages: write

jobs:
  # ──────────────────────────────────────────────
  # Prepare: compute metadata and tags
  # ──────────────────────────────────────────────
  prepare:
    name: "Prepare: compute build metadata"
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      build_date: ${{ steps.meta.outputs.build_date }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short=8 HEAD)
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          VERSION=$(grep -Po '(?<=version = ")[^"]+' pyproject.toml | head -1)

          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Build metadata:"
          echo "  SHA:     ${SHA_SHORT}"
          echo "  Date:    ${BUILD_DATE}"
          echo "  Version: ${VERSION}"

  # ──────────────────────────────────────────────
  # Build and push Docker images (parallel matrix)
  # ──────────────────────────────────────────────
  build-push:
    name: "Build & Push: ${{ matrix.image }}"
    runs-on: ubuntu-latest
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        image: [engine, api, web]
        include:
          - image: engine
            context: .
            dockerfile: infrastructure/docker/Dockerfile.engine
          - image: api
            context: .
            dockerfile: infrastructure/docker/Dockerfile.api
          - image: web
            context: alchymine/web
            dockerfile: infrastructure/docker/Dockerfile.web
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=raw,value=develop
            type=sha,prefix=,format=short
            type=raw,value=${{ needs.prepare.outputs.version }}-dev
            type=raw,value=latest-dev

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          no-cache: ${{ inputs.force_rebuild == 'true' }}

      - name: Verify pushed image
        run: |
          docker buildx imagetools inspect \
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:${{ needs.prepare.outputs.sha_short }}

  # ──────────────────────────────────────────────
  # Post-build: smoke test pulled images
  # ──────────────────────────────────────────────
  smoke-test:
    name: "Smoke test: pulled images"
    runs-on: ubuntu-latest
    needs: [prepare, build-push]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify engine image
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}-engine:${{ needs.prepare.outputs.sha_short }}
          docker run --rm ${{ env.IMAGE_PREFIX }}-engine:${{ needs.prepare.outputs.sha_short }} \
            python -c "import alchymine.engine; print('Engine OK')"

      - name: Pull and verify API image
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}-api:${{ needs.prepare.outputs.sha_short }}
          docker run --rm ${{ env.IMAGE_PREFIX }}-api:${{ needs.prepare.outputs.sha_short }} \
            python -c "import alchymine.api; print('API OK')"

      - name: Pull and verify web image
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}-web:${{ needs.prepare.outputs.sha_short }}
          # Next.js images typically serve on port 3000
          docker run -d --name web-smoke \
            -p 3000:3000 \
            ${{ env.IMAGE_PREFIX }}-web:${{ needs.prepare.outputs.sha_short }}

          echo "Waiting for web server..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web image is serving correctly"
              docker stop web-smoke
              exit 0
            fi
            sleep 2
          done

          echo "Web image did not respond in time"
          docker logs web-smoke
          docker stop web-smoke
          exit 1

  # ──────────────────────────────────────────────
  # Notify on completion
  # ──────────────────────────────────────────────
  notify:
    name: "Notify: build complete"
    runs-on: ubuntu-latest
    if: always()
    needs: [prepare, build-push, smoke-test]
    steps:
      - name: Build summary
        run: |
          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ needs.prepare.outputs.sha_short }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ needs.prepare.outputs.version }}-dev\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build Date** | \`${{ needs.prepare.outputs.build_date }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build** | ${{ needs.build-push.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Smoke Test** | ${{ needs.smoke-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_PREFIX }}-engine:${{ needs.prepare.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_PREFIX }}-api:${{ needs.prepare.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_PREFIX }}-web:${{ needs.prepare.outputs.sha_short }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if build or smoke test failed
        if: needs.build-push.result == 'failure' || needs.smoke-test.result == 'failure'
        run: |
          echo "Build or smoke test failed."
          exit 1
