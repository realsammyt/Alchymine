id: consciousness_001
modality: consciousness_journey
title: Body Scan Awareness Meditation
duration_minutes: 20
difficulty: established
instructions:
  - Lie down or sit in a fully supported position
  - Close your eyes and take three deep cleansing breaths
  - Bring awareness to the top of your skull and notice any sensation
  - Slowly move awareness downward through forehead, eyes, jaw, and neck
  - Continue scanning through shoulders, chest, abdomen, arms, and hands
  - Move through the lower back, hips, thighs, knees, calves, and feet
  - At each area pause 10 to 15 seconds and observe sensation without judgment
  - If the mind wanders note it gently and return to the body location
  - On completing the scan rest in whole-body awareness for 2 minutes
contraindications:
  - schizophrenia
  - bipolar disorder (unmedicated)
  - severe dissociative disorder
traditions:
  - Vipassana (Buddhist)
  - Yoga Nidra (Yogic)
  - MBSR (Western clinical)
evidence_level: moderate
tags:
  - body-scan
  - awareness
  - mindfulness
  - established
