id: inquiry_001
modality: contemplative_inquiry
title: The Work — Four Questions
duration_minutes: 30
difficulty: advanced
instructions:
  - Identify a stressful belief about yourself or another person — write it down
    as a single sentence, e.g. "She doesn't listen to me"
  - Sit quietly and ask yourself Question 1 — Is it true?
  - Ask Question 2 — Can you absolutely know it is true? (yes or no only)
  - Ask Question 3 — How do you react, what happens, when you believe this thought?
  - Ask Question 4 — Who would you be without this thought? Sit with this fully.
  - Now turn the statement around to its opposite and find 3 genuine examples
    where the turnaround is as true or truer than the original
  - Sit quietly for 5 minutes with what has arisen
  - Do not force insight — allow the inquiry to settle in its own time
contraindications:
  - active depersonalisation/derealisation disorder
  - acute existential crisis with suicidal ideation
traditions:
  - The Work (Byron Katie)
  - Atma Vichara (Advaita Vedanta)
  - Socratic method (Greco-Roman)
  - Koan practice (Zen Buddhist)
evidence_level: traditional
tags:
  - inquiry
  - belief-work
  - self-investigation
  - advanced
