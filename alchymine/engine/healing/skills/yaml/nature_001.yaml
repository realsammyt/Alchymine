id: nature_001
modality: nature_healing
title: Shinrin-yoku Forest Walk
duration_minutes: 30
difficulty: foundation
instructions:
  - Choose a natural environment such as a forest, park, coastline, or garden
  - Leave your phone on silent and put it away
  - Begin walking at half your normal pace with no destination in mind
  - Every 5 minutes pause and engage each sense deliberately
  - For sight notice 3 things you have not seen before
  - For hearing identify every sound layer from near to far
  - For smell breathe slowly through your nose and name what you detect
  - For touch place your hand on bark, soil, leaf, or stone
  - If the mind returns to tasks gently bring attention back to sensory input
  - Do not photograph or document - simply be present
  - At the end stand still for 2 minutes and notice how your body feels
contraindications:
  - severe agoraphobia
  - anaphylactic environmental allergies (carry epinephrine if prescribed)
traditions:
  - Shinrin-yoku (Japanese forest bathing)
  - Ecotherapy (Western)
  - Aboriginal connection to country (Indigenous Australian)
evidence_level: strong
tags:
  - nature
  - forest-bathing
  - presence
  - foundation
