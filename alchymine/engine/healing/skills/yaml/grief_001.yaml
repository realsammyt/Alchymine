id: grief_001
modality: grief_healing
title: Letter to the Lost
duration_minutes: 30
difficulty: established
instructions:
  - Create a safe, private space where you will not be interrupted
  - Have paper and pen or a private journal available
  - Take 5 slow breaths to settle and open to what is present
  - Address a letter to the person, relationship, or part of yourself that was lost
  - Write without stopping for 20 minutes — grammar and structure do not matter
  - Include what you miss, what you regret, what you are grateful for, and
    what you wish you had said
  - When complete, read the letter aloud if you are able — your own voice
    witnessing the words has particular power
  - Close with a single sentence of acknowledgment for how far you have come
  - Do not destroy the letter immediately — give yourself 24 hours before deciding
contraindications:
  - complicated grief with active suicidal ideation (use crisis resources instead)
  - bereavement within 48 hours (stabilise with support first)
traditions:
  - Worden's grief tasks (Western clinical)
  - Expressive writing therapy (Western)
  - Keening (Celtic)
evidence_level: strong
tags:
  - grief
  - writing
  - loss
  - established
