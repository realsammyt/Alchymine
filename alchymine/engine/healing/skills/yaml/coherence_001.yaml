id: coherence_001
modality: coherence_meditation
title: Heart Coherence Breathing
duration_minutes: 10
difficulty: foundation
instructions:
  - Sit comfortably and place one hand on your heart centre
  - Close your eyes and shift your attention to the area around your heart
  - Begin breathing at a steady 5-second inhale, 5-second exhale rhythm
  - As you breathe, imagine breathing through your heart
  - Recall a feeling of appreciation, care, or compassion
  - Hold that feeling while maintaining the rhythmic breath
  - Continue for 10 minutes, returning gently if the mind wanders
contraindications:
  - acute psychosis
  - severe dissociative disorder
traditions:
  - HeartMath (Western)
  - Metta (Buddhist)
  - Hesychasm (Christian)
evidence_level: strong
tags:
  - heart-coherence
  - calm
  - emotional-regulation
  - foundation
