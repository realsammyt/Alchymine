id: expressive_001
modality: expressive_healing
title: Automatic Drawing Release
duration_minutes: 20
difficulty: developing
instructions:
  - Gather large paper (A3 or bigger) and a variety of drawing tools
  - Set a timer for 15 minutes and commit to not stopping until it rings
  - Close your eyes and take three deep breaths, noticing your current feeling state
  - Begin moving your hand across the paper without looking — let the body lead
  - Do not plan or evaluate — allow lines, shapes, pressure, and colour to emerge
  - If the mind says "this is wrong," note it and continue moving anyway
  - When the timer rings, set down your tools and open your eyes
  - Spend 5 minutes in quiet observation of what appeared — what surprises you?
  - Write 3 sentences about what you notice without judging the quality
contraindications:
  - acute psychosis with disorganised expression
  - severe perfectionism triggering self-harm (seek clinical assessment first)
traditions:
  - Art therapy (Western clinical)
  - Surrealist automatism (Western)
  - Drum circle (West African / global)
evidence_level: strong
tags:
  - expressive
  - art
  - automatic
  - developing
