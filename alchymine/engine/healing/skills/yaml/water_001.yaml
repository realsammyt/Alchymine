id: water_001
modality: water_healing
title: Mindful Warm Immersion
duration_minutes: 20
difficulty: developing
instructions:
  - Draw a bath at a comfortable warm temperature (38–40°C / 100–104°F)
  - Add optional Epsom salts (2 cups) for magnesium absorption and muscle relaxation
  - Lower into the water slowly and allow the body to settle
  - Close your eyes and notice the weight of the water and its warmth
  - Begin slow belly breathing — 4 counts in, 6 counts out
  - With each exhale, consciously release one area of tension — jaw, shoulders,
    hands, lower back — progressing through the body
  - Rest in the water for a minimum of 15 minutes without phone or media
  - When complete, drain the bath before exiting to feel the shift in temperature
contraindications:
  - aquaphobia (severe) — begin with hand or foot immersion instead
  - open wounds or active skin infections
  - uncontrolled epilepsy near water
  - pregnancy beyond first trimester (consult midwife regarding temperature)
traditions:
  - Onsen (Japanese)
  - Hydrotherapy (Western naturopathic)
  - Mikveh (Jewish)
evidence_level: moderate
tags:
  - water
  - immersion
  - relaxation
  - developing
