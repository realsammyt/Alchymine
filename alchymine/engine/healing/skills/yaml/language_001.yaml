id: language_001
modality: language_awareness
title: The Map Is Not the Territory
duration_minutes: 15
difficulty: developing
instructions:
  - Choose one area of your life where you feel stuck or in conflict
  - Write down 3 statements you regularly tell yourself about this area
  - For each statement, ask — Is this a fact or an interpretation?
  - Identify the specific words that are doing the most emotional work
  - Rewrite each statement replacing evaluative labels with observable behaviours
  - Notice how the rewritten statements change your felt sense of the situation
  - Reflect briefly in your journal on what you discovered
contraindications:
  - active speech therapy for trauma-related mutism
traditions:
  - General Semantics (Korzybski)
  - NLP (Western)
  - Buddhist Right Speech
evidence_level: moderate
tags:
  - language
  - reframing
  - self-awareness
  - developing
