id: sleep_001
modality: sleep_healing
title: Yoga Nidra Sleep Induction
duration_minutes: 25
difficulty: foundation
instructions:
  - Lie down in a comfortable position you can hold for 25 minutes
  - Set an intention called a sankalpa as a short positive statement
  - Close your eyes and take 5 slow deep breaths
  - Rotate awareness through body parts on the right side starting from the
    right thumb through each finger, palm, wrist, forearm, elbow, upper arm,
    shoulder, chest, abdomen, thigh, kneecap, calf, heel, sole, and toes
  - Repeat the full rotation on the left side in the same order
  - Bring awareness to the whole body simultaneously
  - Rest in the space between waking and sleeping without trying to sleep
  - Allow the body to rest deeply while awareness remains lightly present
  - Close by repeating your sankalpa three times then return to full waking
contraindications:
  - untreated sleep apnoea requiring CPAP
traditions:
  - Yoga Nidra (Yogic)
  - CBT-I stimulus control (Western clinical)
evidence_level: strong
tags:
  - sleep
  - relaxation
  - yoga-nidra
  - foundation
