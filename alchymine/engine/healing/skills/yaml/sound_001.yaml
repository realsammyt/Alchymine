id: sound_001
modality: sound_healing
title: Humming Resonance Practice
duration_minutes: 10
difficulty: foundation
instructions:
  - Sit comfortably with your spine upright and hands resting on thighs
  - Close your eyes and take three deep breaths to settle
  - Inhale fully through your nose
  - On the exhale, produce a continuous "mmmm" hum with lips closed
  - Feel the vibration in your lips, skull, and chest
  - Allow the hum to be effortless — not forced
  - Continue for 10 rounds of humming breaths
  - Sit in silence for 2 minutes noticing the resonance and calm
contraindications:
  - sound-triggered epilepsy
  - severe hyperacusis
traditions:
  - Nada Yoga (Indian)
  - Bhramari pranayama (Yogic)
  - Toning (Western sound therapy)
evidence_level: moderate
tags:
  - sound
  - vibration
  - vagal-toning
  - foundation
