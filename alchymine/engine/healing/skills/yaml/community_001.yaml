id: community_001
modality: community_healing
title: Talking Circle Practice
duration_minutes: 60
difficulty: developing
instructions:
  - Gather 3–8 people who consent to the container and agree to confidentiality
  - Arrange seating in a circle with no table or barrier between participants
  - Begin with a brief grounding — one minute of shared silence
  - Introduce the talking piece (any meaningful object) — only the holder speaks
  - Set a single open question for the circle, e.g. "What are you carrying
    that you have not had space to put down?"
  - Each person speaks for up to 3 minutes without interruption or response
  - Listeners practise receiving without advising, fixing, or problem-solving
  - After all have spoken, the circle may open for one round of brief reflections
  - Close with a collective acknowledgment — each person says one word of gratitude
  - Maintain confidentiality of all that was shared
contraindications:
  - severe social anxiety disorder (unmanaged) — begin with 1-on-1 first
  - active paranoid ideation
traditions:
  - Talking circles (Indigenous North American)
  - Ubuntu (Southern African)
  - Group therapy (Western clinical)
  - Sangha (Buddhist)
evidence_level: moderate
tags:
  - community
  - circle
  - witnessing
  - developing
