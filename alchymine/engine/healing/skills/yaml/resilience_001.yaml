id: resilience_001
modality: resilience_training
title: Cold Exposure Threshold Practice
duration_minutes: 10
difficulty: developing
instructions:
  - Begin with a warm shower of 2 minutes at your normal temperature
  - Turn the water to cold and step fully under for 30 seconds
  - Focus on slow, controlled breathing — resist the urge to gasp or tense
  - After 30 seconds, return to warm for 1 minute
  - Repeat the cold/warm cycle two more times, extending cold to 60 seconds
  - Finish with 30 seconds cold, then step out
  - Notice the post-practice sense of alertness and calm
contraindications:
  - acute PTSD without clinical supervision
  - active suicidal ideation
  - Raynaud's disease
  - cardiovascular conditions (consult physician first)
traditions:
  - Stoic philosophy (Greco-Roman)
  - Stress inoculation (Western clinical)
  - Bushido (Japanese)
  - Wim Hof method (contemporary)
evidence_level: strong
tags:
  - resilience
  - cold-exposure
  - stress-inoculation
  - developing
