id: somatic_001
modality: somatic_practice
title: Tension and Trauma Release (TRE) Intro
duration_minutes: 20
difficulty: developing
instructions:
  - Stand with feet shoulder-width apart, toes slightly turned out
  - Bend your knees to about 30 degrees — hold for 60 seconds until mild fatigue
  - Slowly lower to the floor and lie on your back with knees bent, feet flat
  - Allow your knees to fall inward then outward gently — notice any trembling
  - If trembling begins, allow it to happen without suppression
  - Stay with the natural movement of the body for 10–15 minutes
  - To stop, straighten your legs, breathe slowly, and rest for 5 minutes
  - Never force trembling — only allow what arises naturally
contraindications:
  - recent major surgery
  - acute physical injury at practice site
  - active PTSD without clinical supervision for first session
traditions:
  - Somatic Experiencing (Levine)
  - TRE (Berceli)
  - Qigong (Chinese)
evidence_level: strong
tags:
  - somatic
  - trauma-release
  - nervous-system
  - developing
